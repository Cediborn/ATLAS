<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas</title>
  <meta name="description" content="Atlas — your personal operating system. Tasks, notes, calendar, habits, learning, and finance in one calm, fast, keyboard-first system." />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />

  <!-- Set theme before first paint to avoid a flash of the wrong color scheme -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('atlas:state');
        var saved = raw ? JSON.parse(raw) : {};
        var theme = saved.theme || 'system';
        var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/app-shell.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <noscript>
    <div class="noscript-banner">Atlas needs JavaScript enabled to run — it's a fully client-side app, no server involved.</div>
  </noscript>

  <a href="#view-root" class="skip-link">Skip to main content</a>

  <div class="app-shell" id="app-shell">
    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
      <div class="sidebar__header">
        <div class="workspace-switcher">
          <button type="button" class="workspace-switcher__trigger" id="workspace-trigger" aria-label="Switch workspace">
            <span class="workspace-switcher__badge" id="workspace-badge">P</span>
            <span class="workspace-switcher__name">Personal</span>
            <span class="workspace-switcher__chevron">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </span>
          </button>
          <div class="menu" id="workspace-menu" hidden></div>
        </div>
        <button type="button" class="sidebar__collapse-toggle" id="sidebar-collapse-toggle" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg>
        </button>
      </div>

      <nav class="sidebar__nav" id="sidebar-nav" aria-label="Sections"></nav>

      <div class="sidebar__footer">
        <span class="sidebar__footer-label badge">Atlas · Phase 0</span>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- ============ MAIN ============ -->
    <div class="app-shell__main">
      <header class="topbar">
        <div class="topbar__left">
          <button type="button" class="icon-btn topbar__mobile-toggle" id="mobile-menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <h1 class="topbar__title" id="page-title">Dashboard</h1>
        </div>

        <div class="topbar__center">
          <button type="button" class="topbar__search" id="search-trigger">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <span>Search or jump to…</span>
            <kbd>⌘K</kbd>
          </button>
        </div>

        <div class="topbar__right">
          <time class="topbar__date" id="current-date"></time>

          <div class="topbar__icon-wrap">
            <button type="button" class="icon-btn" id="notifications-trigger" aria-label="Notifications">
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8.5a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z"/><path d="M10 20.5a2 2 0 0 0 4 0"/></svg>
              <span class="icon-btn__dot" hidden></span>
            </button>
            <div class="menu menu--right" id="notifications-panel" hidden></div>
          </div>

          <div class="topbar__icon-wrap">
            <button type="button" class="profile-trigger" id="profile-trigger" aria-label="Account menu"></button>
            <div class="menu menu--right" id="profile-menu" hidden></div>
          </div>
        </div>
      </header>

      <main class="view-root" id="view-root" tabindex="-1"></main>
    </div>
  </div>

  <!-- ============ COMMAND PALETTE ============ -->
  <div class="overlay" id="cp-overlay" hidden>
    <div class="command-palette" role="dialog" aria-modal="true" aria-label="Command palette">
      <div class="command-palette__input-wrap">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input
          id="cp-input"
          type="text"
          role="combobox"
          aria-expanded="true"
          aria-controls="cp-list"
          aria-autocomplete="list"
          placeholder="Type a command or search…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <ul class="command-palette__list" id="cp-list" role="listbox" aria-label="Commands"></ul>
      <div class="command-palette__footer">
        <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
        <span><kbd>↵</kbd> select</span>
        <span><kbd>esc</kbd> close</span>
      </div>
    </div>
  </div>

  <script type="module" src="../js/main.js"></script>
</body>
</html>
